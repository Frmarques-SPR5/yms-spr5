<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel YMS — Guarapuava</title>
<style>
  :root {
    --bg: #0f172a;
    --card-bg: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --ok: #16a34a;
    --amarelo: #f2c94c;
    --laranja: #ff9900;
    --vermelho: #e5484d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  h1 { margin: 0 0 4px 0; font-size: 24px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .card .num { font-size: 28px; font-weight: 700; }
  .card .label { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .card.total .num { color: #fff; }
  .card.ok .num { color: var(--ok); }
  .card.amarelo .num { color: var(--amarelo); }
  .card.laranja .num { color: var(--laranja); }
  .card.vermelho .num { color: var(--vermelho); }

  table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 10px; overflow: hidden; }
  th, td { padding: 10px 12px; text-align: left; font-size: 13px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.03em; }
  tr:last-child td { border-bottom: none; }
  tr.row-ok { background: transparent; }
  tr.row-amarelo { background: rgba(242, 201, 76, 0.18); }
  tr.row-laranja { background: rgba(255, 153, 0, 0.20); }
  tr.row-vermelho { background: rgba(229, 72, 77, 0.25); }
  .badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge-ok { background: rgba(22,163,74,0.2); color: #4ade80; }
  .badge-amarelo { background: rgba(242,201,76,0.25); color: #f2c94c; }
  .badge-laranja { background: rgba(255,153,0,0.25); color: #ffb84d; }
  .badge-vermelho { background: rgba(229,72,77,0.3); color: #f87171; }
  .tempo { font-variant-numeric: tabular-nums; font-weight: 600; }
  .empty-state { text-align: center; padding: 40px; color: var(--muted); }
  .error-banner {
    background: #7f1d1d;
    color: #fecaca;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 13px;
    display: none;
  }
  .footer { margin-top: 16px; color: var(--muted); font-size: 12px; text-align: right; }

  /* ===== Visão mobile (cards em vez de tabela) ===== */
  .mobile-list { display: none; }
  .truck-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-left: 5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .truck-card.tier-amarelo { border-left-color: var(--amarelo); }
  .truck-card.tier-laranja { border-left-color: var(--laranja); }
  .truck-card.tier-vermelho { border-left-color: var(--vermelho); }
  .truck-card.tier-ok { border-left-color: var(--ok); }
  .truck-card .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .truck-card .placa { font-size: 18px; font-weight: 700; }
  .truck-card .tempo-mobile { font-variant-numeric: tabular-nums; font-weight: 700; font-size: 15px; }
  .truck-card .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 12px;
    font-size: 13px;
  }
  .truck-card .info-grid .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.02em; }
  .truck-card .info-grid div div:last-child { margin-top: 1px; }

  @media (max-width: 720px) {
    body { padding: 14px; }
    h1 { font-size: 20px; }
    .cards { grid-template-columns: repeat(2, 1fr); }
    table { display: none; }
    .mobile-list { display: block; }
  }
</style>
</head>
<body>

<h1>🚚 Painel YMS — Guarapuava</h1>
<div class="subtitle" id="subtitle">Carregando dados da planilha...</div>

<div class="error-banner" id="errorBanner"></div>

<div class="cards">
  <div class="card total"><div class="num" id="cardTotal">–</div><div class="label">No pátio</div></div>
  <div class="card ok"><div class="num" id="cardOk">–</div><div class="label">Normal (&lt;15min)</div></div>
  <div class="card amarelo"><div class="num" id="cardAmarelo">–</div><div class="label">⚠️ 15–20min</div></div>
  <div class="card laranja"><div class="num" id="cardLaranja">–</div><div class="label">Atenção⚠️ 20–25min</div></div>
  <div class="card vermelho"><div class="num" id="cardVermelho">–</div><div class="label">Possível ofensora⚠️ 25min+</div></div>
</div>

<table>
  <thead>
    <tr>
      <th>Placa</th>
      <th>Vaga</th>
      <th>Tipo de veículo</th>
      <th>Transportadora</th>
      <th>Entrada</th>
      <th>Tempo no pátio</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="tableBody">
    <tr><td colspan="7" class="empty-state">Carregando...</td></tr>
  </tbody>
</table>

<div class="mobile-list" id="mobileList"></div>

<div class="footer" id="footer"></div>

<script>
  // ====== CONFIGURAÇÃO ======
  // Cole aqui a URL do Web App do Apps Script implantado na planilha "YMS - Guarapuava" (conta pessoal), terminando em /exec
  var WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbwLHh0bBrkcQjv8mBDZthaq33MP9riVQ5dvZcE_LWIxd0qUY4govgU3_-JOS-FWWuXjJw/exec';
  var REFETCH_MS = 30000;  // busca dados novos a cada 30s
  var RETICK_MS  = 1000;   // recalcula tempo/cor a cada 1s (sem precisar buscar de novo)
  // ===========================

  var caminhoes = []; // cache da última leitura
  var CALLBACK_NAME = 'onDadosYms';

  function carregarDados() {
    if (!WEBAPP_URL || WEBAPP_URL.indexOf('COLE_AQUI') !== -1) {
      mostrarErro('Configure a variável WEBAPP_URL no topo do index.html com a URL do Web App (Passo 6 do guia).');
      return;
    }
    var script = document.createElement('script');
    var separador = WEBAPP_URL.indexOf('?') === -1 ? '?' : '&';
    script.src = WEBAPP_URL + separador + 'callback=' + CALLBACK_NAME + '&_=' + Date.now();
    script.onerror = function () {
      mostrarErro('Não consegui carregar os dados. Confirme se o Web App foi implantado com acesso "Qualquer pessoa" e se a URL em WEBAPP_URL está correta.');
    };
    document.body.appendChild(script);
    setTimeout(function () { script.remove(); }, 8000);
  }

  function mostrarErro(msg) {
    var banner = document.getElementById('errorBanner');
    banner.textContent = msg;
    banner.style.display = 'block';
  }

  function esconderErro() {
    document.getElementById('errorBanner').style.display = 'none';
  }

  // Callback chamado pelo Web App (via JSONP) quando os dados chegam
  window[CALLBACK_NAME] = function (resp) {
    esconderErro();
    try {
      var lista = (resp.caminhoes || []).map(function (item) {
        return {
          placa: item.placa,
          vaga: item.vaga || '',
          tipo: item.tipo || '',
          transportadora: item.transportadora || '',
          entrada: new Date(item.entradaISO)
        };
      });
      caminhoes = lista;
      document.getElementById('subtitle').textContent =
        'Atualizado às ' + new Date().toLocaleTimeString('pt-BR') + ' • atualiza sozinho a cada 30s';
      render();
    } catch (err) {
      mostrarErro('Erro lendo os dados: ' + err.message);
    }
  };

  function classificar(minutos) {
    if (minutos >= 25) return { tier: 'vermelho', label: 'Possível ofensora⚠️' };
    if (minutos >= 20) return { tier: 'laranja', label: 'Atenção⚠️' };
    if (minutos >= 15) return { tier: 'amarelo', label: '⚠️' };
    return { tier: 'ok', label: '' };
  }

  function fmtTempo(minutosTotais) {
    var totalSeg = Math.floor(minutosTotais * 60);
    var h = Math.floor(totalSeg / 3600);
    var m = Math.floor((totalSeg % 3600) / 60);
    var s = totalSeg % 60;
    function pad(n) { return String(n).padStart(2, '0'); }
    return (h > 0 ? pad(h) + ':' : '') + pad(m) + ':' + pad(s);
  }

  function render() {
    var agora = new Date();
    var enriquecido = caminhoes.map(function (c) {
      var minutos = (agora.getTime() - c.entrada.getTime()) / 60000;
      var status = classificar(minutos);
      return Object.assign({}, c, { minutos: minutos, status: status });
    });
    enriquecido.sort(function (a, b) { return b.minutos - a.minutos; });

    var counts = { ok: 0, amarelo: 0, laranja: 0, vermelho: 0 };
    enriquecido.forEach(function (c) { counts[c.status.tier]++; });
    document.getElementById('cardTotal').textContent = enriquecido.length;
    document.getElementById('cardOk').textContent = counts.ok;
    document.getElementById('cardAmarelo').textContent = counts.amarelo;
    document.getElementById('cardLaranja').textContent = counts.laranja;
    document.getElementById('cardVermelho').textContent = counts.vermelho;

    var tbody = document.getElementById('tableBody');
    var mobileList = document.getElementById('mobileList');

    if (enriquecido.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Nenhum caminhão no pátio no momento 🎉</td></tr>';
      mobileList.innerHTML = '<div class="empty-state">Nenhum caminhão no pátio no momento 🎉</div>';
      return;
    }

    tbody.innerHTML = enriquecido.map(function (c) {
      var horaEntrada = c.entrada.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      return '<tr class="row-' + c.status.tier + '">' +
        '<td><strong>' + c.placa + '</strong></td>' +
        '<td>' + c.vaga + '</td>' +
        '<td>' + c.tipo + '</td>' +
        '<td>' + c.transportadora + '</td>' +
        '<td>' + horaEntrada + '</td>' +
        '<td class="tempo">' + fmtTempo(c.minutos) + '</td>' +
        '<td>' + (c.status.label ? '<span class="badge badge-' + c.status.tier + '">' + c.status.label + '</span>' : '<span class="badge badge-ok">no prazo</span>') +
        '</td>' +
        '</tr>';
    }).join('');

    mobileList.innerHTML = enriquecido.map(function (c) {
      var horaEntrada = c.entrada.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      var badge = c.status.label
        ? '<span class="badge badge-' + c.status.tier + '">' + c.status.label + '</span>'
        : '<span class="badge badge-ok">no prazo</span>';
      return '<div class="truck-card tier-' + c.status.tier + '">' +
        '<div class="top-row">' +
          '<span class="placa">' + c.placa + '</span>' +
          '<span class="tempo-mobile">' + fmtTempo(c.minutos) + '</span>' +
        '</div>' +
        '<div class="info-grid">' +
          '<div><div class="label">Vaga</div><div>' + (c.vaga || '—') + '</div></div>' +
          '<div><div class="label">Entrada</div><div>' + horaEntrada + '</div></div>' +
          '<div><div class="label">Tipo</div><div>' + (c.tipo || '—') + '</div></div>' +
          '<div><div class="label">Transportadora</div><div>' + (c.transportadora || '—') + '</div></div>' +
          '<div><div class="label">Status</div><div>' + badge + '</div></div>' +
        '</div>' +
      '</div>';
    }).join('');

    document.getElementById('footer').textContent = 'GESTÃO YMS - Guarapuava · atualização automática';
  }

  carregarDados();
  setInterval(carregarDados, REFETCH_MS);
  setInterval(render, RETICK_MS);
</script>

</body>
</html>
